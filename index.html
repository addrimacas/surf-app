<div id="dropdown-playas" style="display:none;position:fixed;background:#0d1f35;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:8px 0;z-index:9999;min-width:200px;box-shadow:0 8px 32px rgba(0,0,0,0.6);max-height:70vh;overflow-y:auto;"></div>

<script>
const SVG_AMANECER = `<svg width="20" height="20" viewBox="0 0 40 40" fill="none"><line x1="20" y1="28" x2="20" y2="22" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/><line x1="20" y1="28" x2="14" y2="23" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/><line x1="20" y1="28" x2="26" y2="23" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/><line x1="20" y1="28" x2="11" y2="26" stroke="#FFB347" stroke-width="1.5" stroke-linecap="round"/><line x1="20" y1="28" x2="29" y2="26" stroke="#FFB347" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="30" x2="32" y2="30" stroke="#FFB347" stroke-width="1.5" stroke-linecap="round"/></svg>`;
const SVG_DIA = `<svg width="20" height="20" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="5" stroke="#FFD700" stroke-width="1.5"/><line x1="20" y1="10" x2="20" y2="13" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/><line x1="20" y1="27" x2="20" y2="30" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="20" x2="13" y2="20" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/><line x1="27" y1="20" x2="30" y2="20" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/><line x1="13" y1="13" x2="15" y2="15" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/><line x1="25" y1="25" x2="27" y2="27" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/><line x1="27" y1="13" x2="25" y2="15" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/><line x1="13" y1="27" x2="15" y2="25" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/></svg>`;
const SVG_ATARDECER = `<svg width="20" height="20" viewBox="0 0 40 40" fill="none"><line x1="20" y1="28" x2="20" y2="22" stroke="#FF4500" stroke-width="1.5" stroke-linecap="round"/><line x1="20" y1="28" x2="14" y2="23" stroke="#FF4500" stroke-width="1.5" stroke-linecap="round"/><line x1="20" y1="28" x2="26" y2="23" stroke="#FF4500" stroke-width="1.5" stroke-linecap="round"/><line x1="20" y1="28" x2="11" y2="26" stroke="#FF6B00" stroke-width="1.5" stroke-linecap="round"/><line x1="20" y1="28" x2="29" y2="26" stroke="#FF6B00" stroke-width="1.5" stroke-linecap="round"/><line x1="8" y1="30" x2="32" y2="30" stroke="#FF6B00" stroke-width="1.5" stroke-linecap="round"/></svg>`;

function iconoPorHora(h) {
  if (h >= 7 && h < 9) return SVG_AMANECER;
  if (h >= 9 && h < 20) return SVG_DIA;
  return SVG_ATARDECER;
}

const canvas = document.getElementById('fondo-canvas');
const ctx = canvas.getContext('2d');
let fondoConfig = { colorTop:'#0a1628', colorMid:'#0d2137', colorBot:'#061020', velocidad:0.008, amplitud:30 };
let colorOla = '#1a6faa';
let t = 0;
const olas = [
  {offset:0,speed:1.0,amp:1.0,y:0.55,alpha:0.18},
  {offset:2.1,speed:0.7,amp:0.7,y:0.65,alpha:0.13},
  {offset:4.3,speed:0.5,amp:0.5,y:0.75,alpha:0.09},
  {offset:1.2,speed:1.3,amp:0.4,y:0.45,alpha:0.07},
];
function resize() { canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
function actualizarFondo(altura) {
  if (altura<0.5)      {fondoConfig={colorTop:'#1a1a2e',colorMid:'#2a2a3e',colorBot:'#0f0f1e',velocidad:0.003,amplitud:10};colorOla='#334466';}
  else if (altura<0.8) {fondoConfig={colorTop:'#0a1a2e',colorMid:'#0d2540',colorBot:'#061525',velocidad:0.005,amplitud:18};colorOla='#1a5a88';}
  else if (altura<1.5) {fondoConfig={colorTop:'#0a1628',colorMid:'#0d2a4a',colorBot:'#061020',velocidad:0.008,amplitud:30};colorOla='#1a7aaa';}
  else if (altura<2.5) {fondoConfig={colorTop:'#051528',colorMid:'#0a2545',colorBot:'#030d18',velocidad:0.014,amplitud:45};colorOla='#0a8acc';}
  else                 {fondoConfig={colorTop:'#1a0a10',colorMid:'#2a0d18',colorBot:'#0f0508',velocidad:0.022,amplitud:60};colorOla='#aa2244';}
}
function dibujar() {
  if (document.hidden) return;
  const w=canvas.width,h=canvas.height;
  t+=fondoConfig.velocidad;
  const grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,fondoConfig.colorTop);
  grad.addColorStop(0.5,fondoConfig.colorMid);
  grad.addColorStop(1,fondoConfig.colorBot);
  ctx.fillStyle=grad; ctx.fillRect(0,0,w,h);
  for (const ola of olas) {
    ctx.beginPath(); ctx.moveTo(0,h);
    const baseY=h*ola.y, amp=fondoConfig.amplitud*ola.amp;
    for (let x=0;x<=w;x+=4) {
      const y=baseY+Math.sin((x/w)*Math.PI*3+t*ola.speed+ola.offset)*amp+Math.sin((x/w)*Math.PI*5+t*ola.speed*0.7+ola.offset)*amp*0.4;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(w,h); ctx.closePath();
    const og=ctx.createLinearGradient(0,baseY-amp,0,h);
    og.addColorStop(0,colorOla+Math.round(ola.alpha*255).toString(16).padStart(2,'0'));
    og.addColorStop(1,colorOla+'00');
    ctx.fillStyle=og; ctx.fill();
  }
  requestAnimationFrame(dibujar);
}
window.addEventListener('resize', resize);
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) requestAnimationFrame(dibujar);
});
resize(); dibujar();

let playaActiva = todasLasPlayas()[0];
const PLAYAS = todasLasPlayas();
const fmt = (v, dec = 1) => (v == null || Number.isNaN(v)) ? '—' : Number(v).toFixed(dec);
const rnd = (v) => (v == null || Number.isNaN(v)) ? '—' : String(Math.round(v));

function angleDiff(a, b) {
  const d = (((a - b) % 360) + 360) % 360;
  return d > 180 ? 360 - d : d;
}

function calcularPuntuacion(h, direccion, periodo, playa, dirViento, velViento) {
  if (h == null || Number.isNaN(h)) return 1;
  if (direccion != null && !Number.isNaN(direccion) && direccion > 45 && direccion < 180) return 1;

  let score = 0;
  const exp  = playa?.exposicion ?? 0.5;
  const hMin = (playa?.hMin ?? 0.8) / (0.5 + exp * 0.5);
  const hMax = (playa?.hMax ?? 2.5) * (0.5 + exp);
  const pMin = playa?.pMin ?? 9;

  // Dirección swell (0-4 puntos)
  if (playa && direccion != null && !Number.isNaN(direccion)) {
    const diff = angleDiff(direccion, playa.orient);
    if (diff <= playa.tol * 0.6)     score += 4;
    else if (diff <= playa.tol)      score += 2;
    else if (diff <= playa.tol + 20) score += 1;
    else return 1;
  } else score += 2;

  // Altura (0-4 puntos)
  if (h >= hMin && h <= hMax)            score += 4;
  else if (h >= hMin * 0.7 && h < hMin) score += 2;
  else if (h > hMax && h <= hMax * 1.3) score += 2;

  // Período (0-2 puntos)
  if (periodo >= pMin + 3)  score += 2;
  else if (periodo >= pMin) score += 1;

  // Penalización por viento (dirección + velocidad)
  if (playa && dirViento != null && !Number.isNaN(dirViento)) {
    const offshoreDir = (playa.orient + 180) % 360;
    const diffViento = angleDiff(dirViento, offshoreDir);
    let pen = 0;
    if      (diffViento >= 144) pen = 3;
    else if (diffViento >= 108) pen = 2;
    else if (diffViento >= 72)  pen = 1;
    else if (diffViento >= 36)  pen = 0.5;
    if (pen > 0 && velViento != null && !Number.isNaN(velViento)) {
      if      (velViento > 40) pen *= 1.5;
      else if (velViento > 25) pen *= 1.2;
      else if (velViento < 15) pen *= 0.6;
    }
    score -= pen;
  }

  return Math.round(Math.max(1, Math.min(10, score)) * 10) / 10;
}

function clasificar(h, direccion, playa, periodo, dirViento, velViento) {
  if (h == null || Number.isNaN(h)) return { color:'#888', texto:'Sin datos', bg:'#eeeeee', score: 0 };
  const score = calcularPuntuacion(h, direccion, periodo ?? 8, playa, dirViento, velViento);
  if (score <= 3) return { color:'#ff4444', texto: score <= 1 ? 'Sin olas' : 'No merece la pena', bg:'#fff0f0', score };
  if (score <= 6) return { color:'#FF6B00', texto: score <= 4 ? 'Flojo, pero surfeable' : 'Condiciones aceptables', bg:'#fff4ee', score };
  if (score <= 8) return { color:'#00cc88', texto:'¡Buenas olas!', bg:'#f0fff8', score };
  return                 { color:'#44ff44', texto:'¡Perfecto, no te lo pierdas!', bg:'#f0fff0', score };
}

function dirTxt(g) {
  if (g == null || Number.isNaN(g)) return '—';
  const i = ((Math.round(g / 45) % 8) + 8) % 8;
  return ['N','NE','E','SE','S','SO','O','NO'][i];
}

function resumen(h, p, d, playa) {
  const dir = dirTxt(d);
  if (playa && d != null && !Number.isNaN(d) && playa.orient != null
      && angleDiff(d, playa.orient) > playa.tol) {
    return `Swell del ${dir} fuera de rango para ${playa.nombre} (mira ${playa.swell}). Mejor buscar otro spot.`;
  }
  if (h == null || Number.isNaN(h)) return 'Sin datos del mar ahora mismo.';
  if (h < 0.5) return 'El mar está en calma. No merece salir.';
  if (h < 0.8) return `Olas pequeñas de ${h.toFixed(1)}m, período ${Math.round(p)}s. Bueno para iniciarse.`;
  if (h < 1.5) return `${h.toFixed(1)}m de ola, período ${Math.round(p)}s, swell del ${dir}. Vale la pena salir.`;
  if (h < 2.5) return `Sesión de categoría: ${h.toFixed(1)}m, ${Math.round(p)}s. Swell del ${dir}. ¡No te lo pierdas!`;
  return `Mar bravo: ${h.toFixed(1)}m, ${Math.round(p)}s. Solo para expertos.`;
}

function fmtFecha(ts) {
  const d = new Date(ts * 1000);
  const ahora = new Date();
  const hoy    = ahora.toDateString();
  const manana = new Date(ahora.getTime() + 86400000).toDateString();
  const h = d.getHours().toString().padStart(2, '0') + 'h';
  if (d.toDateString() === hoy)    return `Hoy ${h}`;
  if (d.toDateString() === manana) return `Mañana ${h}`;
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  return `El ${dias[d.getDay()]} ${h}`;
}
function fmtDia(ts) {
  const d = new Date(ts * 1000);
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${dias[d.getDay()]} ${d.getDate()} ${meses[d.getMonth()]}`;
}

function vientoFavorable(dir, playa) {
  if (dir == null || Number.isNaN(dir) || !playa) return false;
  return angleDiff(dir, (playa.orient + 180) % 360) < 45;
}

function etiquetaViento(dirViento, velViento, playa) {
  if (velViento == null || Number.isNaN(velViento) || !playa)
    return { label:'—', desc:'', color:'#8899aa' };
  if (velViento < 5)
    return { label:'GLASSY', desc:'Sin viento', color:'#44cc44' };
  const offshoreDir = (playa.orient + 180) % 360;
  const diff = angleDiff(dirViento, offshoreDir);
  if (diff <  36) return { label:'OFFSHORE',  desc:'Viento de tierra',             color:'#44cc44' };
  if (diff <  72) return { label:'CROSS-OFF', desc:'Cruzado, tirando a offshore',  color:'#FF6B00' };
  if (diff < 108) return { label:'CROSS',     desc:'Viento cruzado',               color:'#FF6B00' };
  if (diff < 144) return { label:'CROSS-ON',  desc:'Cruzado, tirando a onshore',   color:'#ff4444' };
  return               { label:'ONSHORE',   desc:'Viento del mar',               color:'#ff4444' };
}

function cielo(codigo) {
  if (codigo == null || codigo <= 1) return { texto:'Despejado',  color:'#FFD700' };
  if (codigo <= 3)  return { texto:'Nublado',    color:'#88aacc' };
  if (codigo <= 48) return { texto:'Niebla',     color:'#99aabb' };
  if (codigo <= 67) return { texto:'Lluvia',     color:'#6699ff' };
  if (codigo <= 77) return { texto:'Nieve',      color:'#aaddff' };
  if (codigo <= 82) return { texto:'Chubascos',  color:'#5588ee' };

function toggleFavorita() {
  const favActual = localStorage.getItem('salitre_favorita');

  if (favActual === playaActiva.nombre) {
    localStorage.removeItem('salitre_favorita');
    btn.textContent = '☆';
    btn.style.color = '#445566';
  } else {
    localStorage.setItem('salitre_favorita', playaActiva.nombre);

    btn.style.color = '#ffcc00';
  }

    if (fav) playaActiva = fav;
  }
}

async function htmlMareas(playa, tempAgua) {
  const port = playa.portIHM || 'coruna';
  const hoy = new Date();
  const manana = new Date(hoy.getTime() + 86400000);
  const fmt = d => d.toISOString().slice(0,10).replace(/-/g,'');

  try {
    const [r1, r2] = await Promise.all([
      fetch(`https://salitre-mareas.adrimacas.workers.dev/?port=${port}&date=${fmt(hoy)}`),
      fetch(`https://salitre-mareas.adrimacas.workers.dev/?port=${port}&date=${fmt(manana)}`),
    ]);
    const [d1, d2] = await Promise.all([r1.json(), r2.json()]);

    const mareasHoy = d1.mareas?.datos?.marea ?? [];
    if (mareasHoy.length === 0) throw new Error('sin datos');

    // IHM en UTC → convertir a hora local
    const offsetLocal = -hoy.getTimezoneOffset();
    const toMin = m => { const [h,mm] = m.hora.split(':').map(Number); return h*60+mm+offsetLocal; };
    const minToHora = min => {
      const m = ((min % 1440) + 1440) % 1440;
      return String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0');
    };

    // Puntos ordenados: hoy + mañana
    const puntos = [
      ...mareasHoy.map(m => ({ min: toMin(m), h: parseFloat(m.altura), tipo: m.tipo })),
      ...(d2.mareas?.datos?.marea ?? []).map(m => ({ min: toMin(m)+1440, h: parseFloat(m.altura), tipo: m.tipo })),
    ].sort((a,b) => a.min - b.min);

    const ahoraMin = hoy.getHours()*60 + hoy.getMinutes();

    // Interpolación coseno entre dos mareas
    const interpolar = (T, pA, pB) => {
      const ratio = Math.max(0, Math.min(1, (T - pA.min) / (pB.min - pA.min)));
      return pA.h + (pB.h - pA.h) * (1 - Math.cos(Math.PI * ratio)) / 2;
    };

    // Altura en cualquier minuto T
    const alturaEn = T => {
      for (let i = 0; i < puntos.length - 1; i++) {
        if (T >= puntos[i].min && T <= puntos[i+1].min)
          return interpolar(T, puntos[i], puntos[i+1]);
      }
      if (T < puntos[0].min) return interpolar(T, puntos[0], puntos[1]);
      return interpolar(T, puntos[puntos.length-2], puntos[puntos.length-1]);
    };

    // Ventana: -4h a +4h (8h total), ahora en el centro
    const inicioMin = ahoraMin - 4*60;
    const finMin    = ahoraMin + 4*60;
    const ventanaMin = finMin - inicioMin;

    // Escala Y: 0 hasta maxPleamar + 0.5
    const maxH = Math.max(...puntos.map(p => p.h)) + 0.5;

    const W = 300, H = 210;
    const mL = 24, mR = 2, mT = 4, mB = 20; // márgenes
    const xDeMin = T => mL + ((T - inicioMin) / ventanaMin) * (W - mL - mR);
    const yDeH   = h  => mT + (1 - h / maxH) * (H - mT - mB);

    // Curva: un punto cada 5 minutos
    const pts = [];
    for (let T = inicioMin; T <= finMin; T += 5) {
      pts.push(`${xDeMin(T).toFixed(1)},${yDeH(alturaEn(T)).toFixed(1)}`);
    }
    const pathD = 'M ' + pts.join(' L ');
    const areaD = pathD + ` L ${W-mR},${H-mB} L ${mL},${H-mB} Z`;

    // Punto hora actual
    const pxAhora = xDeMin(ahoraMin);
    const pyAhora = yDeH(alturaEn(ahoraMin));
    const alturaActual = alturaEn(ahoraMin);

    // Etiquetas X cada hora
    const etiqX = [];
    const primeraMarca = Math.ceil(inicioMin / 60) * 60;
    for (let T = primeraMarca; T <= finMin; T += 60) {
      const m = ((T % 1440) + 1440) % 1440;
      etiqX.push({ x: xDeMin(T), label: String(Math.floor(m/60)) });
    }

    // Etiquetas Y
    const etiqY = [];
    for (let v = 0; v <= Math.floor(maxH); v++) {
      etiqY.push({ y: yDeH(v), label: `${v}m` });
    }

    // Marea anterior y siguiente para footer
    let anterior = null, siguiente = null;
    for (const p of puntos) {
      if (p.min <= ahoraMin) anterior = p;
      else if (!siguiente)   siguiente = p;
    }
    const hAnt = anterior?.h ?? 0;
    const hSig = siguiente?.h ?? 0;
    const subiendo = hSig > hAnt;
    const labelAnt = anterior?.tipo === 'pleamar' ? '▲ Pleamar' : '▼ Bajamar';
    const labelSig = siguiente?.tipo === 'pleamar' ? '▲ Pleamar' : '▼ Bajamar';

    return `
      <div class="label" style="margin-bottom:2px;">Marea · ${tempAgua?.toFixed(1)??'--'}°C agua</div>
      <div style="text-align:center;font-size:16px;font-weight:700;color:#44ddaa;margin-bottom:0px;">
        ${alturaActual.toFixed(1)}m ${subiendo?'↑':'↓'}
        <span style="font-size:11px;font-weight:400;color:#8899aa;">${subiendo?'subiendo':'bajando'}</span>
      </div>
      <svg width="100%" viewBox="0 0 ${W} ${H}" style="margin:0;overflow:hidden;display:block;">
        <defs>
          <clipPath id="grafica-clip">
            <rect x="${mL}" y="${mT}" width="${W-mL-mR}" height="${H-mT-mB}"/>
          </clipPath>
        </defs>
        <!-- Grid horizontal -->
        ${etiqY.map(e => `<line x1="${mL}" y1="${e.y.toFixed(1)}" x2="${W-mR}" y2="${e.y.toFixed(1)}" stroke="#ffffff18" stroke-width="0.5"/>`).join('')}
        <!-- Grid vertical (sin la primera que coincide con el eje Y) -->
        ${etiqX.slice(1).map(e => `<line x1="${e.x.toFixed(1)}" y1="${mT}" x2="${e.x.toFixed(1)}" y2="${H-mB}" stroke="#ffffff18" stroke-width="0.5"/>`).join('')}
        <!-- Eje Y -->
        <line x1="${mL}" y1="${mT}" x2="${mL}" y2="${H-mB}" stroke="#ffffff30" stroke-width="1"/>
        <!-- Eje X -->
        <line x1="${mL}" y1="${H-mB}" x2="${W-mR}" y2="${H-mB}" stroke="#ffffff30" stroke-width="1"/>
        <!-- Area bajo curva -->
        <path d="${areaD}" fill="#44ddaa" opacity="0.08" clip-path="url(#grafica-clip)"/>
        <!-- Curva -->
        <path d="${pathD}" fill="none" stroke="#44ddaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#grafica-clip)"/>
        <!-- Línea vertical hora actual -->
        <line x1="${pxAhora.toFixed(1)}" y1="${pyAhora.toFixed(1)}" x2="${pxAhora.toFixed(1)}" y2="${H-mB}" stroke="#44ddaa" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
        <!-- Punto hora actual -->
        <circle cx="${pxAhora.toFixed(1)}" cy="${pyAhora.toFixed(1)}" r="5" fill="#44ddaa" filter="drop-shadow(0 0 4px #44ddaa)"/>
        <!-- Etiquetas Y: a la izquierda de la línea Y, alineadas a la derecha -->
        ${etiqY.map(e => `<text x="${mL-3}" y="${(e.y+3).toFixed(0)}" fill="#7799aa" font-size="10" font-family="sans-serif" text-anchor="end">${e.label}</text>`).join('')}
        <!-- Etiquetas X: debajo de la línea X, centradas en cada marca -->
        ${etiqX.map(e => `<text x="${e.x.toFixed(0)}" y="${H-mB+13}" fill="#7799aa" font-size="10" font-family="sans-serif" text-anchor="middle">${e.label}</text>`).join('')}
      </svg>
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:0px;">
        <div style="color:#8899aa;">
          <div>${labelAnt}</div>
          <div style="white-space:nowrap;">${minToHora(anterior?.min??0)} · ${hAnt.toFixed(1)}m</div>
        </div>
        <div style="color:#8899aa;text-align:right;">
          <div>${labelSig}</div>
          <div style="white-space:nowrap;">${minToHora(siguiente?.min??0)} · ${hSig.toFixed(1)}m</div>
        </div>
      </div>`;
  } catch(e) {
    return `<div class="label">Marea · ${tempAgua?.toFixed(1)??'--'}°C agua</div>
      <div style="color:#8899aa;font-size:13px;text-align:center;padding:12px;">Sin datos de marea</div>`;
  }
}

function flechaDireccion(grados, color, size = 36) {
  if (grados == null || Number.isNaN(grados)) return '';
  const rad = (grados + 90) * Math.PI / 180;
  const cx = size / 2, cy = size / 2, r = size / 2 - 4;
  const x2 = cx + r * Math.cos(rad),           y2 = cy + r * Math.sin(rad);
  const x1 = cx - (r * 0.5) * Math.cos(rad),   y1 = cy - (r * 0.5) * Math.sin(rad);
  const perpX = Math.sin(rad) * 5,              perpY = -Math.cos(rad) * 5;
  const baseX = x2 - Math.cos(rad) * 7,         baseY = y2 - Math.sin(rad) * 7;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" fill="none">
    <circle cx="${cx}" cy="${cy}" r="${r}" stroke="${color}" stroke-width="1" opacity="0.25"/>
    <line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${baseX.toFixed(1)}" y2="${baseY.toFixed(1)}"
      stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="${x2.toFixed(1)},${y2.toFixed(1)} ${(baseX+perpX).toFixed(1)},${(baseY+perpY).toFixed(1)} ${(baseX-perpX).toFixed(1)},${(baseY-perpY).toFixed(1)}"
      fill="${color}"/>
  </svg>`;
}

          <div style="font-size:19px;font-weight:800;letter-spacing:1px;color:${etViento.color};margin-bottom:3px;">${etViento.label}</div>
          <div style="font-size:11px;color:#8899aa;">${etViento.desc}</div>
        </div>
        <div class="dato-card" style="padding:10px 16px 4px;align-self:start;height:fit-content;">
          ${await htmlMareas(playaActiva, tempAgua)}
        </div>
        <div class="dato-card" style="padding:10px 16px 12px;">
          <div class="label">Cielo · ${tempAire?.toFixed(1) ?? '--'}°C aire</div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin:6px 0 8px;">
            <div style="font-size:38px;font-weight:800;color:white;line-height:1;">${fmt(tempAire, 0)}°</div>
            <div>${iconoCielo(codigoCielo, 52)}</div>
          </div>
          <div style="font-size:15px;font-weight:600;color:${cieloActual.color};margin-bottom:6px;">${cieloActual.texto}</div>
          <div style="font-size:12px;">
            <span style="color:#ff8866;">↑ ${fmt(tempMax, 0)}°</span>
            <span style="color:#8899aa;margin:0 4px;">·</span>
            <span style="color:#66aaff;">↓ ${fmt(tempMin, 0)}°</span>
          </div>
        </div>
      </div>
      ${prevHtml}`;
    document.getElementById('resumen-texto').textContent = resumen(altura, periodo, dirSwell, playaActiva);
    cargarMejoresOlas();
    document.getElementById('dropdown-playas').innerHTML =
      Object.entries(SPOTS['España']['Galicia']).map(([zona, playas]) => `
        <div style="padding:6px 16px 4px;font-size:10px;color:#4a7a9b;text-transform:uppercase;letter-spacing:0.8px;border-bottom:0.5px solid rgba(255,255,255,0.05);">— ${zona} —</div>
        ${playas.map(p => `
          <div onclick="seleccionarPlayaPorNombre('${p.nombre}')"
            style="padding:10px 16px;font-size:14px;color:${p.nombre === playaActiva.nombre ? '#4db8ff' : '#ccddee'};cursor:pointer;border-bottom:0.5px solid rgba(255,255,255,0.05);">
            ${p.nombre}
          </div>`).join('')}`).join('');
  } catch(e) {
    console.error(e);
    document.getElementById('ultima-actualizacion').textContent = 'Error de conexión · reintentando en 10 min';
    document.getElementById('contenido-inicio').innerHTML =
      `<p style="text-align:center;color:#ff6b6b;padding:40px;">No se pudieron cargar los datos.<br><span style="color:#8899aa;font-size:13px;">Revisa tu conexión.</span></p>`;
  }
}

function renderPrevision(marine, ahora, dirViento) {
  if (!marine?.hourly?.time) return '';
  const tiempos = marine.hourly.time;
  const alturas  = marine.hourly.wave_height;
  const periodos = marine.hourly.wave_period;
  const dirs     = marine.hourly.wave_direction;

  const hoyItems = [];
  for (let i=0;i<tiempos.length;i++) {
    const tt=new Date(tiempos[i] * 1000);
    const hora=tt.getHours();
    const diffH=(tt-ahora)/3600000;
    if(hora<7||hora>22||hora%2!==0) continue;
    if(diffH<-8||diffH>8) continue;
    const esActual=Math.abs(diffH)<1.5;
    // En previsión no tenemos viento horario, pasamos null
    const estado=clasificar(alturas[i],dirs[i],playaActiva,periodos[i],null);
    hoyItems.push(`
      <div class="prev-card ${esActual?'actual':''}">
        <div style="margin-bottom:4px;">${iconoPorHora(hora)}</div>
        <div class="pc-fecha">${fmtFecha(tiempos[i])}</div>
        <div class="pc-semaforo" style="background:${estado.color};box-shadow:0 0 6px ${estado.color}88;"></div>
        <div class="pc-altura">${fmt(alturas[i])}m</div>
        <div class="pc-detalle">${rnd(periodos[i])}s · ${dirTxt(dirs[i])}</div>
      </div>`);
  }

  const diasMap={};
  for(let i=0;i<tiempos.length;i++){
    const tt=new Date(tiempos[i] * 1000);
    const hora=tt.getHours();
    const key=tt.toDateString();
    const diffDias=(tt-ahora)/86400000;
    if(diffDias<0||diffDias>3) continue;
    if(![8,14,20].includes(hora)) continue;
    if(!diasMap[key]) diasMap[key]={label:fmtDia(tiempos[i]),franjas:{}};
    const franja=hora===8?'Mañana':hora===14?'Tarde':'Atardecer';
    const icono=hora===8?SVG_AMANECER:hora===14?SVG_DIA:SVG_ATARDECER;
    const estado=clasificar(alturas[i],dirs[i],playaActiva,periodos[i],null);
    diasMap[key].franjas[franja]=`
      <div class="prev-franja">
        <div style="margin-bottom:3px;">${icono}</div>
        <div class="pf-label">${franja}</div>
        <div class="pf-semaforo" style="background:${estado.color};"></div>
        <div class="pf-altura">${fmt(alturas[i])}m</div>
        <div class="pf-detalle">${rnd(periodos[i])}s · ${dirTxt(dirs[i])}</div>
      </div>`;
  }
  const tresItems=Object.values(diasMap).map(dia=>`
    <div class="prev-dia-bloque">
      <div class="prev-dia-header">${dia.label}</div>
      <div class="prev-dia-franjas">
        ${dia.franjas['Mañana']||''}
        ${dia.franjas['Tarde']||''}
        ${dia.franjas['Atardecer']||''}
      </div>
    </div>`).join('');

  const diezMap={};
  for(let i=0;i<tiempos.length;i++){
    const tt=new Date(tiempos[i] * 1000);
    const key=tt.toDateString();
    const diffDias=(tt-ahora)/86400000;
    if(diffDias<0||diffDias>10) continue;
    if(!diezMap[key]) diezMap[key]={label:fmtDia(tiempos[i]),maxH:0,periodo:0,dir:0};
    if((alturas[i]||0)>diezMap[key].maxH){
      diezMap[key].maxH=alturas[i];
      diezMap[key].periodo=periodos[i];
      diezMap[key].dir=dirs[i];
    }
  }
  const diezItems=Object.values(diezMap).map(dia=>{
    const estado=clasificar(dia.maxH,dia.dir,playaActiva,dia.periodo,null);
    return `
      <div class="prev-fila">
        <div class="pfi-dia">${dia.label}</div>
        <div class="pfi-semaforo" style="background:${estado.color};box-shadow:0 0 6px ${estado.color}88;"></div>
        <div class="pfi-altura">${fmt(dia.maxH)}m</div>
        <div class="pfi-detalle">${rnd(dia.periodo)}s · ${dirTxt(dia.dir)}</div>
        <div class="pfi-estado" style="color:${estado.color};">${estado.texto}</div>
      </div>`;
  }).join('');

  return `
    <div class="prevision">
      <div class="prevision-titulo">Previsión</div>
      <div class="prev-tabs">
        <button class="prev-tab activo" onclick="cambiarPrevTab('hoy',this)">Hoy</button>
        <button class="prev-tab" onclick="cambiarPrevTab('3d',this)">3 días</button>
        <button class="prev-tab" onclick="cambiarPrevTab('10d',this)">10 días</button>
      </div>
      <div id="prev-hoy" class="prev-hoy"><div class="prev-hoy-inner">${hoyItems.join('')}</div></div>
      <div id="prev-3d" class="prev-dias" style="display:none;">${tresItems}</div>
      <div id="prev-10d" class="prev-lista" style="display:none;">${diezItems}</div>
    </div>
    <div style="max-width:420px;margin:16px auto 0;background:rgba(10,22,40,0.6);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:14px 16px;">
      <div style="font-size:11px;color:#8899aa;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;">Mejores olas cerca</div>
      <div id="mejores-olas"></div>
    </div>`;
}

function cambiarPrevTab(tab,btn){
  ['hoy','3d','10d'].forEach(t=>{
    document.getElementById('prev-'+t).style.display=t===tab?(t==='hoy'?'block':'flex'):'none';
  });
  document.querySelectorAll('.prev-tab').forEach(b=>b.classList.remove('activo'));
  btn.classList.add('activo');
}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}

async function cargarMejoresOlas() {
  const contenedor = document.getElementById('mejores-olas');
  if (!contenedor) return;
  contenedor.innerHTML = `<div style="font-size:12px;color:#8899aa;text-align:center;padding:8px;">Buscando mejores olas...</div>`;
  const uLat = playaActiva.lat, uLon = playaActiva.lon;
  const playas = todasLasPlayas().filter(p => p.nombre !== playaActiva.nombre);
  const resultados = [];
  for (const playa of playas) {
    try {
      const res = await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${playa.lat}&longitude=${playa.lon}&current=wave_height,wave_period,wave_direction&timeformat=iso8601`);
      const data = await res.json();
      const c = data.current;
      const estado = clasificar(c.wave_height, c.wave_direction, playa, c.wave_period, null);
      const km = Math.round(haversine(uLat, uLon, playa.lat, playa.lon));
      if (estado.score >= 4) resultados.push({ playa, estado, km, altura: c.wave_height, periodo: c.wave_period });
    } catch(e) {}
  }
  resultados.sort((a,b) => {
    const scoreA = b.estado.score - (b.km/50)*0.5;
    const scoreB = a.estado.score - (a.km/50)*0.5;
    return scoreA - scoreB;
  });
  const top3 = resultados.slice(0,3);
  if (top3.length === 0) {
    contenedor.innerHTML = `<div style="font-size:12px;color:#8899aa;text-align:center;padding:12px;">Sin buenas condiciones cerca ahora mismo.</div>`;
    return;
  }
  contenedor.innerHTML = top3.map(r => `
    <div onclick="seleccionarPlayaPorNombre('${r.playa.nombre}')"
      style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid rgba(255,255,255,0.06);cursor:pointer;">
      <div style="width:36px;height:36px;border-radius:50%;background:${r.estado.color};box-shadow:0 0 10px ${r.estado.color}88;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <span style="font-size:14px;font-weight:800;color:white;">${r.estado.score}</span>
      </div>
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:600;">${r.playa.nombre}</div>
        <div style="font-size:12px;color:#8899aa;">${r.altura.toFixed(1)}m · ${Math.round(r.periodo)}s · ${r.km} km</div>
      </div>
      <div style="font-size:11px;color:${r.estado.color};font-weight:600;">${r.estado.texto}</div>
    </div>`).join('');
}

function seleccionarPlayaPorNombre(nombre) {
  const playa = todasLasPlayas().find(p => p.nombre === nombre);
  if (playa) {
    playaActiva = playa;
    document.getElementById('dropdown-playas').style.display = 'none';
    cargarInicio();
    cargarMejoresOlas();
  }
}

let mapa=null,mapaIniciado=false,capaActual=null,capaMarcadores=null;
const capas={
  oscuro:   L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© CARTO',maxZoom:19}),
  satelite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:19}),
};
function crearIcono(color){
  return L.divIcon({className:'',html:`<div style="width:22px;height:22px;border-radius:50%;background:${color};border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.5);"></div>`,iconSize:[22,22],iconAnchor:[11,11],popupAnchor:[0,-14]});
}
async function cargarDatosPlaya(playa){
  const res=await fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${playa.lat}&longitude=${playa.lon}&current=wave_height,wave_period,wave_direction`);
  if(!res.ok) throw new Error('HTTP '+res.status);
  const data=await res.json();
  return {playa,c:data.current};
}
function renderMarcador(playa,c){
  const h=c?.wave_height,p=c?.wave_period,d=c?.wave_direction;
  const estado=clasificar(h,d,playa,p,null);
  return L.marker([playa.lat,playa.lon],{icon:crearIcono(estado.color)})
    .bindPopup(`
      <div class="popup-playa">
        <h3>🏄 ${playa.nombre}</h3>
        <div class="popup-grid">
          <div class="popup-dato"><div class="pl">Altura</div><div class="pv" style="color:#1a6faa">${fmt(h)}m</div></div>
          <div class="popup-dato"><div class="pl">Período</div><div class="pv" style="color:#0a8a5a">${rnd(p)}s</div></div>
          <div class="popup-dato"><div class="pl">Dirección</div><div class="pv">${dirTxt(d)}</div></div>
          <div class="popup-dato"><div class="pl">Estado</div><div class="pv" style="color:${estado.color};font-size:12px;">${estado.texto}</div></div>
        </div>
        <div class="popup-estado" style="background:${estado.bg};color:${estado.color};">${estado.texto}</div>
      </div>`,{maxWidth:220});
}
async function refrescarMarcadores(){
  if(!mapa) return;
  if(capaMarcadores) capaMarcadores.clearLayers();
  else{capaMarcadores=L.layerGroup();capaMarcadores.addTo(mapa);}
  const resultados=await Promise.allSettled(PLAYAS.map(cargarDatosPlaya));
  resultados.forEach((r,i)=>{
    const playa=PLAYAS[i];
    const c=r.status==='fulfilled'?r.value.c:null;
    renderMarcador(playa,c).addTo(capaMarcadores);
  });
}
async function iniciarMapa(){
  mapaIniciado=true;
  mapa=L.map('mapa').setView([43.25,-8.7],9);
  capaActual=capas.oscuro;
  capaActual.addTo(mapa);
  await refrescarMarcadores();
}
function cambiarEstilo(estilo,btn){
  document.querySelectorAll('.btn-estilo').forEach(b=>b.classList.remove('activo'));
  btn.classList.add('activo');
  if(capaActual) mapa.removeLayer(capaActual);
  capaActual=capas[estilo];capaActual.addTo(mapa);
}
function irA(pantalla,btn){
  document.querySelectorAll('.pantalla').forEach(p=>p.classList.remove('activa'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('activo'));
  document.getElementById('pantalla-'+pantalla).classList.add('activa');
  btn.classList.add('activo');
  if(pantalla==='mapa'&&!mapaIniciado) iniciarMapa();
}

(async()=>{
  localStorage.removeItem('salitre_exposicion');
  await inicializarExposicion();
  iniciarPlayaFavorita();
  cargarInicio();
  setInterval(()=>{cargarInicio();if(mapaIniciado)refrescarMarcadores();},10*60*1000);
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden){cargarInicio();if(mapaIniciado)refrescarMarcadores();}
  });
  document.addEventListener('click',e=>{
    const dd=document.getElementById('dropdown-playas');
    if(dd&&!e.target.closest('#btn-selector')&&!e.target.closest('#dropdown-playas')){
      dd.style.display='none';
    }
  });
})();
</script>
